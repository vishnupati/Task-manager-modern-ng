<header class="bg-[#161b22] border-b border-[#30363d] px-4 py-2 flex items-center justify-between sticky top-0 z-10">
    <a class="flex items-center gap-2 text-[#f0f6fc] font-semibold text-lg hover:text-[#58a6ff] transition-colors"
        routerLink="/tasks">
        <div class="w-8 h-8 bg-[#58a6ff] rounded-md flex items-center justify-center font-bold text-white">TM</div>
        <span>Task Manager</span>
    </a>

    <nav class="flex items-center gap-4">
        @if (isAuthenticated()) {
        <a routerLink="/tasks" routerLinkActive="text-[#58a6ff]"
            class="text-[#c9d1d9] hover:text-[#f0f6fc] px-3 py-2 rounded-md transition-colors">Tasks</a>
        }
        <a routerLink="/angular-apis-demo" routerLinkActive="text-[#58a6ff]"
            class="text-[#c9d1d9] hover:text-[#f0f6fc] px-3 py-2 rounded-md transition-colors">Angular APIs</a>
    </nav>

    <div class="flex items-center gap-4">
        @if (!isAuthenticated()) {
        <a class="text-[#c9d1d9] hover:text-[#f0f6fc] px-3 py-2 rounded-md transition-colors" routerLink="/login">Sign
            in</a>
        <a class="bg-[#238636] hover:bg-[#2ea043] text-white px-3 py-2 rounded-md transition-colors"
            routerLink="/signup">Sign up</a>
        } @else {
        <button type="button"
            class="flex items-center gap-2 text-[#c9d1d9] hover:text-[#f0f6fc] px-3 py-2 rounded-md transition-colors"
            (click)="toggleMenu()" aria-haspopup="menu" [attr.aria-expanded]="isMenuOpen()">
            @if (user()?.avatarUrl) {
            <img [src]="user()?.avatarUrl" [alt]="user()?.name + ' avatar'" class="w-6 h-6 rounded-full" />
            } @else {
            <span
                class="w-6 h-6 bg-[#58a6ff] rounded-full flex items-center justify-center text-xs font-semibold text-white">{{
                initials() }}</span>
            }
        </button>

        @if (isMenuOpen()) {
        <section
            class="absolute top-full right-0 mt-2 bg-[#161b22] border border-[#30363d] rounded-md shadow-lg p-4 w-48"
            role="menu">
            <p class="text-[#f0f6fc] font-semibold mb-1">{{ user()?.name }}</p>
            <p class="text-[#c9d1d9] text-sm mb-3">{{ user()?.email }}</p>
            <a routerLink="/settings" (click)="isMenuOpen.set(false)"
                class="block text-[#c9d1d9] hover:text-[#f0f6fc] py-2">User settings</a>
            <button type="button" (click)="logout()"
                class="block text-[#c9d1d9] hover:text-[#f0f6fc] py-2 w-full text-left">Log out</button>
        </section>
        }
        }
    </div>
</header>
