<section class="toast-stack" aria-live="polite" aria-label="Notifications">
    @for (toast of toasts(); track toast.id) {
    <article class="toast" [class.error]="toast.type === 'error'" [class.success]="toast.type === 'success'">
        <span>{{ toast.message }}</span>
        <button type="button" (click)="dismiss(toast.id)">x</button>
    </article>
    }
</section>
