<form (submit)="onSubmit($event)" novalidate class="space-y-6">
    <div>
        <h2 class="text-xl font-semibold text-[#f0f6fc] mb-2">{{ isEditMode() ? 'Edit task' : 'Add new task' }}</h2>
        <p class="text-[#c9d1d9]">Capture what matters and keep delivery visible.</p>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-[#f0f6fc] mb-2">Title</label>
            <input type="text" [formField]="taskForm.title" placeholder="Ship Angular signals migration"
                class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-md text-[#f0f6fc] placeholder-[#c9d1d9] focus:outline-none focus:ring-2 focus:ring-[#0969da] focus:border-[#0969da]" />
            @if (taskForm.title().touched() && taskForm.title().invalid()) {
            <ul class="mt-1 text-sm text-red-400">
                @for (error of taskForm.title().errors(); track error.kind) {
                <li>{{ error.message }}</li>
                }
            </ul>
            }
        </div>

        <div>
            <label class="block text-sm font-medium text-[#f0f6fc] mb-2">Description</label>
            <textarea [formField]="taskForm.description" rows="4" placeholder="Optional details"
                class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-md text-[#f0f6fc] placeholder-[#c9d1d9] focus:outline-none focus:ring-2 focus:ring-[#0969da] focus:border-[#0969da] resize-none"></textarea>
        </div>

        @if (isEditMode()) {
        <div>
            <label class="block text-sm font-medium text-[#f0f6fc] mb-2">Status</label>
            <select [formField]="taskForm.status"
                class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-md text-[#f0f6fc] focus:outline-none focus:ring-2 focus:ring-[#0969da] focus:border-[#0969da]">
                <option value="pending" class="bg-[#0d1117] text-[#f0f6fc]">Pending</option>
                <option value="completed" class="bg-[#0d1117] text-[#f0f6fc]">Completed</option>
            </select>
        </div>
        }
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-[#30363d]">
        <button type="button" (click)="cancel()"
            class="px-4 py-2 text-[#c9d1d9] hover:text-[#f0f6fc] hover:bg-[#30363d] rounded-md transition-colors">
            Cancel
        </button>
        <button type="submit"
            class="px-4 py-2 bg-[#0969da] hover:bg-[#0969da]/90 text-white rounded-md font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="isBusy() || !isFormValid()">
            {{ isBusy() ? 'Saving...' : isEditMode() ? 'Save changes' : 'Create task' }}
        </button>
    </div>
</form>
