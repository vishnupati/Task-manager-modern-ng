<main class="min-h-screen bg-[#0d1117] py-8">
    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-[#161b22] border border-[#30363d] rounded-lg p-8">
            <h1 class="text-2xl font-semibold text-[#f0f6fc] mb-2">User settings</h1>
            <p class="text-[#c9d1d9] mb-8">Manage your profile information.</p>

            <form (submit)="onSave($event)" novalidate class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-[#f0f6fc] mb-2">Name</label>
                    <input type="text" [formField]="settingsForm.name" autocomplete="name"
                        class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-md text-[#f0f6fc] focus:outline-none focus:ring-2 focus:ring-[#0969da] focus:border-[#0969da]" />
                    @if (settingsForm.name().touched() && settingsForm.name().invalid()) {
                    <ul class="mt-1 text-sm text-red-400">
                        @for (error of settingsForm.name().errors(); track error.kind) {
                        <li>{{ error.message }}</li>
                        }
                    </ul>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#f0f6fc] mb-2">Email</label>
                    <input type="email" [formField]="settingsForm.email" autocomplete="email"
                        class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-md text-[#f0f6fc] focus:outline-none focus:ring-2 focus:ring-[#0969da] focus:border-[#0969da]" />
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="px-4 py-2 bg-[#0969da] hover:bg-[#0969da]/90 text-white rounded-md font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        [disabled]="!canSave()">
                        {{ isSaving() ? 'Saving...' : 'Save changes' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
