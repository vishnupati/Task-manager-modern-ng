<main class="settings-shell">
    <section class="settings-card">
        <h1>User settings</h1>
        <p>Manage your profile information.</p>

        <form (submit)="save($event)" novalidate>
            <label>
                Name
                <input type="text" [formField]="settingsForm.name" autocomplete="name" />
            </label>
            @if (settingsForm.name().touched() && settingsForm.name().invalid()) {
            <ul class="error-list">
                @for (error of settingsForm.name().errors(); track error) {
                <li>{{ error.message }}</li>
                }
            </ul>
            }

            <label>
                Email
                <input type="email" [formField]="settingsForm.email" autocomplete="email" />
            </label>

            <button type="submit" [disabled]="!canSave()">
                {{ isSaving() ? 'Saving...' : 'Save changes' }}
            </button>
        </form>
    </section>
</main>
